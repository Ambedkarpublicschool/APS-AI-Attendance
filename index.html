<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APS AI Kiosk Attendance</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        html, body { height: 100vh; width: 100vw; margin: 0; padding: 0; overflow: hidden; touch-action: none; background-color: #030712; }
        .dynamic-kiosk-card {
            width: 96vw;
            max-width: 540px;
            height: 85vh;
            max-height: 720px;
            position: relative; 
            box-shadow: 0 0 35px rgba(6, 182, 212, 0.25); 
            border: 2px solid rgba(6, 182, 212, 0.4);
            transition: all 0.3s ease;
        }
        .scanner-line { position: absolute; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, #06b6d4, transparent); animation: scan 2.5s linear infinite; box-shadow: 0 0 15px #06b6d4; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
    </style>
</head>
<body class="text-white font-sans flex flex-col select-none justify-center items-center bg-slate-950">

    <main class="w-full flex justify-center items-center">
        <div id="master-kiosk" class="dynamic-kiosk-card bg-black rounded-3xl overflow-hidden shadow-2xl">
            
            <div id="camera-view" class="w-full h-full relative">
                <video id="video" autoplay muted playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
                <canvas id="overlay" class="absolute top-0 left-0 w-full h-full scale-x-[-1]"></canvas>
                <div id="laser-bar" class="scanner-line"></div>
                
                <div class="absolute top-4 left-4 z-10">
                    <div id="system-status" class="px-4 py-1.5 rounded-full text-xs font-black bg-slate-900/80 text-cyan-400 border border-cyan-500/30 tracking-wider uppercase animate-pulse">
                        STARTING SYSTEM...
                    </div>
                </div>

                <div id="sub-status" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-slate-900/80 backdrop-blur-md border border-cyan-500/30 px-6 py-2 rounded-full shadow-lg z-10 flex items-center gap-2">
                    <span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span></span>
                    <h3 id="sub-status-text" class="text-[11px] font-black tracking-widest text-cyan-400 uppercase">SCANNER READY...</h3>
                </div>
            </div>

            <div id="info-result" class="hidden w-full h-full bg-slate-900 flex flex-col items-center justify-center text-center p-6 transition-all">
                <div class="relative">
                    <img id="student-img" src="" class="w-28 h-28 rounded-full object-cover border-4 border-emerald-500 shadow-xl shadow-emerald-500/30" alt="Student">
                </div>
                <h2 id="student-name" class="text-3xl font-black text-emerald-400 mt-4 uppercase tracking-wide">---</h2>
                <p id="student-id" class="text-sm font-black text-cyan-400 mt-1 tracking-widest bg-cyan-950 px-4 py-1.5 rounded-md border border-cyan-500/20">ID: ---</p>
                <div class="mt-5 px-8 py-2.5 rounded-xl text-xs font-black tracking-widest bg-emerald-500 text-slate-950 uppercase shadow-md">
                    HAZIRI LOCKED (P)
                </div>
            </div>

        </div>
    </main>

    <script>
        const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxR2l-MYhAqKrVRD68C9hgvlMqHU6GalGp18Gvyoc05QFG3ixEA9o4xk4a31G8N5uKn/exec";

        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusDiv = document.getElementById('system-status');
        const subStatusText = document.getElementById('sub-status-text');
        const cameraView = document.getElementById('camera-view');
        const resultDiv = document.getElementById('info-result');
        
        let faceMatcher = null;
        let isProcessing = false;
        let studentLookupMap = {}; 
        let isLoopStarted = false;

        function playLoudKioskBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(950, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.18); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.20);
            } catch (e) { console.log("Audio Error:", e); }
        }

        function activateFullscreen() {
            const docEl = document.documentElement;
            const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
            if (requestFS) { requestFS.call(docEl).catch(err => console.log(err)); }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
            .then(stream => { 
                video.srcObject = stream;
                ['click', 'touchstart', 'pointerdown'].forEach(evt => {
                    document.addEventListener(evt, activateFullscreen, { once: true });
                });
                initializeSystem();
            })
            .catch(err => { statusDiv.innerText = "CAMERA ERROR!"; });
        }

        async function initializeSystem() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                statusDiv.innerText = "LOADING AI MODELS...";
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                // बिना किसी देरी के 0 सेकंड में लाइव कैशे चालू करना
                const savedMatrix = localStorage.getItem('aps_ai_matrix_cache');
                const savedLookup = localStorage.getItem('aps_student_lookup_cache');
                
                if (savedMatrix && savedLookup) {
                    studentLookupMap = JSON.parse(savedLookup);
                    const rawDescriptors = JSON.parse(savedMatrix);
                    
                    const labeledDescriptors = rawDescriptors.map(rd => {
                        const descriptors = rd.descriptors.map(d => new Float32Array(d));
                        return new faceapi.LabeledFaceDescriptors(rd.label, descriptors);
                    });
                    
                    faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.40);
                    startScanningLoop();
                    
                    statusDiv.innerText = "INSTANT LOCAL CACHE ACTIVE";
                    statusDiv.className = "px-4 py-1.5 rounded-full text-xs font-black bg-emerald-950 text-emerald-400 border border-emerald-500/30 tracking-wider uppercase animate-pulse";
                    subStatusText.innerText = "SCANNER ACTIVE";
                } else {
                    statusDiv.innerText = "FIRST RUN: INITIALIZING ONLINE";
                }

                if (navigator.onLine) {
                    setTimeout(syncWithServer, 100);
                } else {
                    setOfflineStatus();
                }
            } catch (err) { statusDiv.innerText = "SYSTEM LOCKDOWN!"; }
        }

        async function syncWithServer() {
            try {
                // लोकल स्टोरेज से आखिरी बार रिकॉर्ड किया गया टाइमस्टैम्प उठाएं
                const lastSyncTimestamp = localStorage.getItem('aps_last_sync_timestamp') || '0';
                
                // केवल टाइमस्टैम्प भेजें—सर्वर को पता चल जाएगा कि नया डेटा भेजना है या नहीं
                const checkUrl = `${BASE_API_URL}?lastSync=${lastSyncTimestamp}&_=${Date.now()}`;
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); 

                const response = await fetch(checkUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                const resData = await response.json();

                // 🌟 अगर सर्वर कहता है 'no_change', तो पूरा डेटा मंगाने की कोई ज़रूरत नहीं!
                if (resData && resData.status === "no_change") {
                    statusDiv.innerText = "AI SECURITY SECURED (SMART CACHE)";
                    statusDiv.className = "px-4 py-1.5 rounded-full text-xs font-black bg-emerald-950 text-emerald-400 border border-emerald-500/30 tracking-wider uppercase animate-pulse";
                    if (!isLoopStarted) startScanningLoop();
                    return;
                }

                // अगर कोई नया एडमिशन या बदलाव हुआ है, तभी डेटा रिफ्रेश होगा
                if (resData && resData.status === "success" && resData.data) {
                    localStorage.setItem('aps_last_sync_timestamp', resData.serverTime.toString());
                    await buildAndCacheFaceMatcher(resData.data);
                    if (!isLoopStarted) startScanningLoop();
                }
            } catch (e) {
                console.log("Delta Sync bypassed:", e);
                setOfflineStatus();
            }
        }

        function setOfflineStatus() {
            statusDiv.innerText = "RUNNING OFFLINE MODE";
            statusDiv.className = "px-4 py-1.5 rounded-full text-xs font-black bg-amber-950 text-amber-400 border border-amber-500/30 tracking-wider uppercase";
        }

        async function buildAndCacheFaceMatcher(data) {
            const labeledDescriptors = [];
            const tempLookupMap = {}; 
            subStatusText.innerText = "PROCESSING FRESH MATRIX...";
            
            for (let student of data) {
                if (!student.photo || student.photo.length < 50) continue; 
                
                tempLookupMap[student.id] = {
                    name: student.name,
                    photo: student.photo
                };

                try {
                    const img = new Image(); 
                    img.src = student.photo; 
                    await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });

                    const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                    if (detections) {
                        labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(student.id, [detections.descriptor]));
                    }
                } catch(e) {}
            }
            
            if (labeledDescriptors.length > 0) {
                studentLookupMap = tempLookupMap;
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.40);
                
                const jsonReadyDescriptors = labeledDescriptors.map(ld => ({
                    label: ld.label,
                    descriptors: ld.descriptors.map(d => Array.from(d))
                }));
                
                localStorage.setItem('aps_ai_matrix_cache', JSON.stringify(jsonReadyDescriptors));
                localStorage.setItem('aps_student_lookup_cache', JSON.stringify(tempLookupMap));
                
                subStatusText.innerText = "SCANNER ACTIVE";
                statusDiv.innerText = "AI SECURITY SECURED";
                statusDiv.className = "px-4 py-1.5 rounded-full text-xs font-black bg-emerald-950 text-emerald-400 border border-emerald-500/30 tracking-wider uppercase animate-pulse";
            }
        }

        function startScanningLoop() {
            if (isLoopStarted || !faceMatcher) return;
            isLoopStarted = true;
            
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(overlay, displaySize);

            setInterval(async () => {
                if (isProcessing || !faceMatcher) return;

                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);

                if (detections && detections.length > 0) {
                    const displaySizeLive = { width: video.clientWidth, height: video.clientHeight };
                    faceapi.matchDimensions(overlay, displaySizeLive);
                    const resizedDetections = faceapi.resizeResults(detections, displaySizeLive);
                    faceapi.draw.drawDetections(overlay, resizedDetections);

                    let targetDetection = detections[0];
                    if (detections.length > 1) {
                        detections.sort((a, b) => b.detection.box.width - a.detection.box.width);
                        targetDetection = detections[0]; 
                    }

                    const bestMatch = faceMatcher.findBestMatch(targetDetection.descriptor);
                    if (bestMatch.label !== 'unknown') {
                        const matchedId = bestMatch.label;
                        const studentInfo = studentLookupMap[matchedId];
                        if (studentInfo) {
                            triggerAttendance(matchedId, studentInfo.name, studentInfo.photo);
                        }
                    }
                }
            }, 250); 
        }

        async function triggerAttendance(studentId, studentName, studentPhoto) {
            isProcessing = true;
            playLoudKioskBeep();

            cameraView.classList.add('hidden');
            resultDiv.classList.remove('hidden');
            
            document.getElementById('student-name').innerText = studentName;
            document.getElementById('student-id').innerText = `ID: ${studentId}`;
            document.getElementById('student-img').src = studentPhoto;

            try {
                const sheetTriggerUrl = `${BASE_API_URL}?studentId=${encodeURIComponent(studentId)}`;
                if (navigator.onLine) {
                    fetch(sheetTriggerUrl, { method: 'POST', mode: 'no-cors' });
                }
            } catch (err) {}

            setTimeout(() => {
                resultDiv.classList.add('hidden');
                cameraView.classList.remove('hidden');
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
                isProcessing = false;
            }, 1200);
        }

        window.onload = startVideo;
    </script>
</body>
</html>

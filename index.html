<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APS AI Kiosk Attendance</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        /* [NO SCROLL RULE] पूरे पेज पर स्क्रॉल बार को जड़ से ख़त्म और फ्रीज कर दिया है */
        html, body { 
            height: 100vh; 
            width: 100vw; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            touch-action: none; 
            background-color: #030712; 
        }
        
        /* [AUTO RESIZE MASTER CLASS] मोबाइल चाहे 6 इंच हो या 8 इंच, यह कार्ड हमेशा स्क्रीन साइज में ऑटो-फिट रहेगा */
        .dynamic-kiosk-card {
            width: 96vw;
            max-width: 540px;
            height: 85vh;
            max-height: 720px;
            position: relative; 
            box-shadow: 0 0 35px rgba(6, 182, 212, 0.25); 
            border: 2px solid rgba(6, 182, 212, 0.4);
            transition: all 0.3s ease;
        }

        .scanner-line { position: absolute; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, #06b6d4, transparent); animation: scan 2.5s linear infinite; box-shadow: 0 0 15px #06b6d4; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
    </style>
</head>
<body class="text-white font-sans flex flex-col select-none justify-center items-center bg-slate-950">

    <main class="w-full flex justify-center items-center">
        <div id="master-kiosk" class="dynamic-kiosk-card bg-black rounded-3xl overflow-hidden shadow-2xl">
            
            <div id="camera-view" class="w-full h-full relative">
                <video id="video" autoplay muted playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
                <canvas id="overlay" class="absolute top-0 left-0 w-full h-full scale-x-[-1]"></canvas>
                <div id="laser-bar" class="scanner-line"></div>
                
                <div class="absolute top-4 left-4 z-10">
                    <div id="system-status" class="px-4 py-1.5 rounded-full text-xs font-black bg-slate-900/80 text-cyan-400 border border-cyan-500/30 tracking-wider uppercase animate-pulse">
                        AI MODELS LOADING...
                    </div>
                </div>

                <div id="sub-status" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-slate-900/80 backdrop-blur-md border border-cyan-500/30 px-6 py-2 rounded-full shadow-lg z-10 flex items-center gap-2">
                    <span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span></span>
                    <h3 class="text-[11px] font-black tracking-widest text-cyan-400 uppercase">SCANNER READY...</h3>
                </div>
            </div>

            <div id="info-result" class="hidden w-full h-full bg-slate-900 flex flex-col items-center justify-center text-center p-6 transition-all">
                <div class="relative">
                    <img id="student-img" src="" class="w-28 h-28 rounded-full object-cover border-4 border-emerald-500 shadow-xl shadow-emerald-500/30" alt="Student">
                </div>
                <h2 id="student-name" class="text-3xl font-black text-emerald-400 mt-4 uppercase tracking-wide">---</h2>
                <p id="student-id" class="text-sm font-black text-cyan-400 mt-1 tracking-widest bg-cyan-950 px-4 py-1.5 rounded-md border border-cyan-500/20">ID: ---</p>
                <div class="mt-5 px-8 py-2.5 rounded-xl text-xs font-black tracking-widest bg-emerald-500 text-slate-950 uppercase shadow-md">
                    HAZIRI LOCKED (P)
                </div>
            </div>

        </div>
    </main>

    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav" preload="auto"></audio>

    <script>
        const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxR2l-MYhAqKrVRD68C9hgvlMqHU6GalGp18Gvyoc05QFG3ixEA9o4xk4a31G8N5uKn/exec";

        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusDiv = document.getElementById('system-status');
        const subStatus = document.getElementById('sub-status');
        const cameraView = document.getElementById('camera-view');
        const resultDiv = document.getElementById('info-result');
        const laserBar = document.getElementById('laser-bar');
        const beepSound = document.getElementById('beep-sound');
        
        let faceMatcher = null;
        let isProcessing = false;

        // [100% BULLETPROOF FULLSCREEN FUNCTION ON FIRST TOUCH]
        function activateFullscreen() {
            const docEl = document.documentElement;
            const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
            if (requestFS) { 
                requestFS.call(docEl).catch(err => console.log(err)); 
            }
            // इवेंट्स को तुरंत हटा देंगे ताकि दोबारा क्लिक पर दिक्कत न हो
            ['click', 'touchstart', 'pointerdown'].forEach(evt => {
                document.removeEventListener(evt, activateFullscreen);
            });
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
            .then(stream => { 
                video.srcObject = stream;
                
                // स्क्रीन पर पहले ही टच/जेस्चर पर 100% फुलस्क्रीन एक्टिवेट
                ['click', 'touchstart', 'pointerdown'].forEach(evt => {
                    document.addEventListener(evt, activateFullscreen, { once: true });
                });
                
                loadAIAndData();
            })
            .catch(err => { statusDiv.innerText = "CAMERA ERROR!"; });
        }

        async function loadAIAndData() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                statusDiv.innerText = "ERP LIVE SYNCING...";
                const forceRefreshUrl = `${BASE_API_URL}?_=${Date.now()}`;
                const response = await fetch(forceRefreshUrl);
                const resData = await response.json();

                if (!resData || resData.status !== "success" || !resData.data) {
                    statusDiv.innerText = "DATA STORAGE ERROR!"; return;
                }

                statusDiv.innerText = "MAPPING SECURITY MATRIX...";
                const labeledDescriptors = [];
                
                for (let student of resData.data) {
                    if (!student.photo || student.photo.length < 50) continue; 
                    try {
                        const img = new Image(); 
                        img.src = student.photo; 
                        await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });

                        const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        if (detections) {
                            labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(`${student.id}||${student.name}||${student.photo}`, [detections.descriptor]));
                        }
                    } catch(e) {}
                }

                if(labeledDescriptors.length === 0) { statusDiv.innerText = "MAP DATA EMPTY!"; return; }

                // हाई-एक्यूरेसी लॉक्ड थ्रेशोल्ड 0.38
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.38);
                statusDiv.innerText = "AI SECURITY SECURED";
                statusDiv.className = "px-4 py-1.5 rounded-full text-xs font-black bg-emerald-950 text-emerald-400 border border-emerald-500/30 tracking-wider uppercase animate-pulse";
                
                startScanningLoop();
            } catch (err) { statusDiv.innerText = "SYSTEM LOCKED DOWN!"; }
        }

        function startScanningLoop() {
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(overlay, displaySize);

            setInterval(async () => {
                if (isProcessing || !faceMatcher) return;

                const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);

                if (detection) {
                    const resizedDetection = faceapi.resizeResults(detection, displaySize);
                    faceapi.draw.drawDetections(overlay, resizedDetection);

                    const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                    if (bestMatch.label !== 'unknown') {
                        const [id, name, photo] = bestMatch.label.split('||');
                        triggerAttendance(id, name, photo);
                    }
                }
            }, 250); 
        }

        async function triggerAttendance(studentId, studentName, studentPhoto) {
            isProcessing = true;
            
            // [300MS EXTRA LOUD BEEP LOCK] बिजली जैसी तेज़ कड़क बीप आवाज़ सिर्फ 300 मिलीसेकंड के लिए बजेगी
            try {
                beepSound.volume = 100.0; 
                beepSound.currentTime = 0;
                beepSound.play();
                setTimeout(() => { 
                    beepSound.pause(); 
                }, 50); 
            } catch(e){}

            // कैमरा मोड तुरंत छुपाएं और उसी सिंगल बॉक्स में छात्र का स्टेटस लोड करें
            cameraView.classList.add('hidden');
            resultDiv.classList.remove('hidden');
            
            document.getElementById('student-name').innerText = studentName;
            document.getElementById('student-id').innerText = `ID: ${studentId}`;
            document.getElementById('student-img').src = studentPhoto;

            try {
                const sheetTriggerUrl = `${BASE_API_URL}?studentId=${encodeURIComponent(studentId)}`;
                await fetch(sheetTriggerUrl, { method: 'POST', mode: 'no-cors' });
            } catch (err) {}

            // 3.5 सेकंड का होल्ड टाइम फिर स्क्रीन स्मूथ रीसेट
            setTimeout(() => {
                resultDiv.classList.add('hidden');
                cameraView.classList.remove('hidden');
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
                isProcessing = false;
            }, 3500);
        }

        window.onload = startVideo;
    </script>
</body>
</html>

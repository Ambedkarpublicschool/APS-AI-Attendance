<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APS AI Kiosk Attendance</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { overflow: hidden; touch-action: manipulation; background-color: #030712; }
        .scanner-container { position: relative; box-shadow: 0 0 25px rgba(6, 182, 212, 0.3); border: 2px solid rgba(6, 182, 212, 0.4); }
        .scanner-line { height: 4px; background: linear-gradient(90deg, transparent, #06b6d4, transparent); animation: scan 2.5s linear infinite; box-shadow: 0 0 15px #06b6d4; }
        .scanner-line.blink-mode { background: linear-gradient(90deg, transparent, #eab308, transparent); box-shadow: 0 0 15px #eab308; animation: scan 1.2s linear infinite; }
        .scanner-line.verified { background: linear-gradient(90deg, transparent, #10b981, transparent); box-shadow: 0 0 15px #10b981; animation: none; top: 50%; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
    </style>
</head>
<body class="text-white font-sans h-screen w-screen flex flex-col m-0 p-0 select-none justify-between">

    <main class="flex-1 w-full h-full flex flex-col md:flex-row p-3 gap-3 justify-center items-center">
        <div class="scanner-container relative w-full md:w-3/5 aspect-[4/3] bg-black rounded-2xl overflow-hidden">
            <video id="video" autoplay muted playsinline class="w-full h-full object-cover"></video>
            <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
            <div id="laser-bar" class="absolute left-0 w-full scanner-line"></div>
            <div class="absolute top-4 left-4">
                <div id="system-status" class="px-4 py-1.5 rounded-full text-xs font-black bg-cyan-950/60 text-cyan-400 border border-cyan-500/30 tracking-wider uppercase animate-pulse">
                    AI मॉडल्स लोड हो रहे हैं...
                </div>
            </div>
        </div>

        <div id="info-card" class="w-full md:w-2/5 max-w-md bg-gray-940 rounded-2xl border border-gray-800 p-6 flex flex-col items-center justify-center text-center h-48 md:h-[450px]">
            <div id="info-placeholder" class="flex flex-col items-center">
                <div class="w-20 h-20 bg-cyan-950/30 rounded-full flex items-center justify-center border border-cyan-500/20 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 009 11V7a4 4 0 018 0v4c0 .654.054 1.3.159 1.93M12 11a4 4 0 00-4-4M12 11v8m0 0h.01" />
                    </svg>
                </div>
                <h3 id="sub-status" class="text-sm font-bold tracking-widest text-gray-400 mt-5 uppercase">कैमरा सक्रिय. छात्र सामने आएं...</h3>
            </div>

            <div id="info-result" class="hidden w-full flex flex-col items-center">
                <div class="relative">
                    <img id="student-img" src="" class="w-28 h-28 md:w-36 md:h-36 rounded-full object-cover border-4 border-emerald-500 shadow-xl" alt="Student">
                </div>
                <h2 id="student-name" class="text-3xl md:text-4xl font-black text-emerald-400 mt-5 uppercase tracking-wide">---</h2>
                <p id="student-id" class="text-xs md:text-sm font-black text-cyan-400 mt-1 tracking-widest bg-cyan-950 px-3 py-1 rounded-md border border-cyan-500/20">ID: ---</p>
                <div class="mt-5 px-8 py-2.5 rounded-xl text-sm font-black tracking-widest bg-emerald-500/20 text-emerald-400 border border-emerald-500/40 uppercase">
                    HAZIRI LOCKED (P)
                </div>
            </div>
        </div>
    </main>

    <audio id="beep-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <script>
        const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxR2l-MYhAqKrVRD68C9hgvlMqHU6GalGp18Gvyoc05QFG3ixEA9o4xk4a31G8N5uKn/exec";

        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusDiv = document.getElementById('system-status');
        const subStatus = document.getElementById('sub-status');
        const laserBar = document.getElementById('laser-bar');
        const beepSound = document.getElementById('beep-sound');
        
        let faceMatcher = null;
        let isProcessing = false;
        let blinkHistory = [];
        const BLINK_THRESHOLD = 0.23; 

        function requestFullScreen() {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } })
            .then(stream => { 
                video.srcObject = stream;
                document.body.addEventListener('click', requestFullScreen, { once: true });
                loadAIAndData();
            })
            .catch(err => { statusDiv.innerText = "CAMERA ERROR!"; });
        }

        async function loadAIAndData() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                statusDiv.innerText = "LOADING LIVE DATA...";
                const forceRefreshUrl = `${BASE_API_URL}?_=${Date.now()}`;
                const response = await fetch(forceRefreshUrl);
                const resData = await response.json();

                if (!resData || resData.status !== "success" || !resData.data) {
                    statusDiv.innerText = "DATA ERROR!"; return;
                }

                statusDiv.innerText = "MAPPING CYBER-EYE...";
                const labeledDescriptors = [];
                for (let student of resData.data) {
                    if (!student.photo) continue;
                    try {
                        const img = new Image(); img.src = student.photo; 
                        await new Promise((resolve) => img.onload = resolve);
                        const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        if (detections) {
                            labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(`${student.id}||${student.name}||${student.photo}`, [detections.descriptor]));
                        }
                    } catch(e) {}
                }

                if(labeledDescriptors.length === 0) { statusDiv.innerText = "MAP EMPTY!"; return; }

                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.38);
                statusDiv.innerText = "AI SECURITY ENFORCED";
                statusDiv.className = "px-4 py-1.5 rounded-full text-xs font-black bg-emerald-950 text-emerald-400 border border-emerald-500/30 tracking-wider uppercase animate-pulse";
                subStatus.innerText = "कैमरे के ठीक सामने देखें...";
                
                startScanningLoop();
            } catch (err) { statusDiv.innerText = "LOCKDOWN MODE!"; }
        }

        function getEAR(eyePoints) {
            const dist_v1 = Math.hypot(eyePoints[1].x - eyePoints[5].x, eyePoints[1].y - eyePoints[5].y);
            const dist_v2 = Math.hypot(eyePoints[2].x - eyePoints[4].x, eyePoints[2].y - eyePoints[4].y);
            const dist_h = Math.hypot(eyePoints[0].x - eyePoints[3].x, eyePoints[0].y - eyePoints[3].y);
            return (dist_v1 + dist_v2) / (2.0 * dist_h);
        }

        function startScanningLoop() {
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(overlay, displaySize);

            setInterval(async () => {
                if (isProcessing || !faceMatcher) return;

                const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);

                if (detection) {
                    const resizedDetection = faceapi.resizeResults(detection, displaySize);
                    faceapi.draw.drawDetections(overlay, resizedDetection);

                    const landmarks = detection.landmarks;
                    const avgEAR = (getEAR(landmarks.getLeftEye()) + getEAR(landmarks.getRightEye())) / 2;
                    const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                    
                    if (bestMatch.label !== 'unknown') {
                        const [id, name, photo] = bestMatch.label.split('||');
                        laserBar.className = "absolute left-0 w-full scanner-line blink-mode";
                        subStatus.innerText = `${name}, कृपया पलक झपकाएं (BLINK EYE)...`;
                        subStatus.className = "text-sm font-black text-yellow-400 mt-5 animate-bounce";

                        if (avgEAR < BLINK_THRESHOLD) {
                            blinkHistory.push(true);
                        } else if (blinkHistory.length > 0 && avgEAR > BLINK_THRESHOLD + 0.04) {
                            blinkHistory = [];
                            triggerAttendance(id, name, photo);
                        }
                    } else {
                        laserBar.className = "absolute left-0 w-full scanner-line";
                        subStatus.innerText = "चेहरा मैच नहीं हुआ (UNKNOWN)";
                        subStatus.className = "text-sm font-black text-red-500 mt-5 tracking-wide";
                        blinkHistory = [];
                    }
                } else {
                    laserBar.className = "absolute left-0 w-full scanner-line";
                    subStatus.innerText = "अटेंडेंस के लिए कैमरे के सामने सीधे देखें...";
                    subStatus.className = "text-sm font-bold text-gray-500 mt-5 tracking-widest";
                    blinkHistory = [];
                }
            }, 100); 
        }

        async function triggerAttendance(studentId, studentName, studentPhoto) {
            isProcessing = true;
            
            // [CRITICAL BEEP FIX] तुरंत बिना देरी के बीप साउंड प्ले करना
            try {
                beepSound.currentTime = 0;
                beepSound.play();
            } catch(e){ console.log("Audio play deferred: " + e); }
            
            if (navigator.vibrate) navigator.vibrate(300);

            document.getElementById('info-placeholder').classList.add('hidden');
            const resultDiv = document.getElementById('info-result');
            resultDiv.classList.remove('hidden');
            
            document.getElementById('student-name').innerText = studentName;
            document.getElementById('student-id').innerText = `ID: ${studentId}`;
            document.getElementById('student-img').src = studentPhoto;
            
            laserBar.className = "absolute left-0 w-full scanner-line verified";

            // [FIXED ATTENDANCE MARK WRITE] - अल्टरनेटिव क्वेरी स्ट्रिंग मेथड फॉर 100% POST SUCCESS IN NO-CORS
            try {
                const sheetTriggerUrl = `${BASE_API_URL}?studentId=${encodeURIComponent(studentId)}`;
                await fetch(sheetTriggerUrl, { method: 'POST', mode: 'no-cors' });
            } catch (err) { console.log(err); }

            setTimeout(() => {
                document.getElementById('info-placeholder').classList.remove('hidden');
                resultDiv.classList.add('hidden');
                laserBar.className = "absolute left-0 w-full scanner-line";
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
                isProcessing = false;
            }, 3500);
        }

        window.onload = startVideo;
    </script>
</body>
</html>

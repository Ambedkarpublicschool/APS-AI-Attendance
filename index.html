<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APS AI Attendance System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Face-API.js Loading with explicit mirror -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        .cyber-border {
            box-shadow: 0 0 15px rgba(5, 213, 250, 0.6);
        }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="p-4 bg-gray-900 border-b border-cyan-500/30 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wider text-cyan-400">APS AI ATTENDANCE SYSTEM</h1>
        <div id="system-status" class="px-3 py-1 rounded-full text-xs bg-yellow-500/20 text-yellow-400 border border-yellow-500/40">
            सिस्टम लोड हो रहा है...
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 max-w-6xl mx-auto w-full items-center justify-center">
        
        <!-- Video Camera Section -->
        <div class="relative flex flex-col items-center bg-gray-900 p-3 rounded-xl border border-gray-800 cyber-border max-w-lg w-full">
            <div class="relative w-full aspect-video bg-black rounded-lg overflow-hidden">
                <video id="video" autoplay muted playsinline class="w-full h-full object-cover"></video>
                <canvas id="overlay" class="absolute top-0 left-0 w-full h-full"></canvas>
            </div>
            <p class="text-xs text-gray-400 mt-2">कैमरे के सामने सीधे देखें</p>
        </div>

        <!-- Student Info Display -->
        <div id="info-card" class="bg-gray-900 p-6 rounded-xl border border-gray-800 w-full max-w-sm flex flex-col items-center text-center justify-center h-64 min-h-[16rem]">
            <div id="info-placeholder">
                <div class="w-20 h-20 bg-gray-800 rounded-full flex items-center justify-center mx-auto text-gray-600 border border-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h3 class="text-lg font-medium text-gray-400 mt-4">स्कैनिंग के लिए तैयार</h3>
                <p class="text-sm text-gray-500 mt-1">चेहरा डिटेक्ट होते ही जानकारी यहाँ दिखेगी</p>
            </div>

            <!-- Dynamic Result -->
            <div id="info-result" class="hidden w-full">
                <img id="student-img" src="" class="w-24 h-24 rounded-full mx-auto object-cover border-2 border-emerald-500" alt="Student">
                <h2 id="student-name" class="text-2xl font-bold text-emerald-400 mt-3">---</h2>
                <p id="student-id" class="text-sm text-cyan-400 mt-1">ID: ---</p>
                <div id="mark-status" class="mt-4 px-4 py-1.5 rounded-lg font-semibold inline-block">
                    PRESENT
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="p-3 bg-gray-900 text-center text-xs text-gray-600 border-t border-gray-800">
        Aryavart Public School © 2026 | Powered by Apps Script & Face-API
    </footer>

    <!-- Beep Sound -->
    <audio id="beep-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <!-- App Logic Script -->
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxR2l-MYhAqKrVRD68C9hgvlMqHU6GalGp18Gvyoc05QFG3ixEA9o4xk4a31G8N5uKn/exec";

        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const statusDiv = document.getElementById('system-status');
        const beepSound = document.getElementById('beep-sound');
        
        let faceMatcher = null;
        let isProcessing = false;

        async function init() {
            try {
                statusDiv.innerText = "AI मॉडल्स लोड हो रहे हैं...";
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                statusDiv.innerText = "छात्रों का डेटा सिंक हो रहा है...";
                
                // Apps Script Redirects को संभालने के लिए नो-कैश और सिंपल गेटवे फेच
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                const resData = await response.json();

                if (resData.status !== "success" || !resData.data || resData.data.length === 0) {
                    statusDiv.innerText = "त्रुटि: शीट में एक्टिव छात्र या फोटो नहीं मिले!";
                    statusDiv.className = "px-3 py-1 rounded-full text-xs bg-red-500/20 text-red-400 border border-red-500/40";
                    return;
                }

                statusDiv.innerText = "फेस एआई ट्रेनिंग चल रही है...";
                const labeledDescriptors = [];
                for (let student of resData.data) {
                    if (!student.photo) continue;
                    
                    const img = new Image();
                    img.src = student.photo;
                    await new Promise(r => img.onload = r);

                    const detections = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions())
                                                    .withFaceLandmarks()
                                                    .withFaceDescriptor();
                    if (detections) {
                        labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(
                            student.id + "||" + student.name + "||" + student.photo, 
                            [detections.descriptor]
                        ));
                    }
                }

                if(labeledDescriptors.length === 0) {
                    statusDiv.innerText = "त्रुटि: एक्टिव छात्रों की ड्राइव फोटो लोड नहीं हो पाई!";
                    statusDiv.className = "px-3 py-1 rounded-full text-xs bg-red-500/20 text-red-400 border border-red-500/40";
                    return;
                }

                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
                statusDiv.innerText = "सिस्टम चालू है (स्कैनिंग सक्रिय)";
                statusDiv.className = "px-3 py-1 rounded-full text-xs bg-emerald-500/20 text-emerald-400 border border-emerald-500/40";

                startVideo();
            } catch (err) {
                console.error("Initialization error:", err);
                statusDiv.innerText = "नेटवर्क कनेक्टिविटी या CORS फ़ेल!";
                statusDiv.className = "px-3 py-1 rounded-full text-xs bg-red-500/20 text-red-400 border border-red-500/40";
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => { video.srcObject = stream; })
                .catch(err => console.error("कैमरा एक्सेस एरर:", err));
        }

        video.addEventListener('play', () => {
            const displaySize = { width: video.clientWidth, height: video.clientHeight };
            faceapi.matchDimensions(overlay, displaySize);

            setInterval(async () => {
                if (isProcessing || !faceMatcher) return;

                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                                                .withFaceLandmarks()
                                                .withFaceDescriptors();
                
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
                faceapi.draw.drawDetections(overlay, resizedDetections);

                for (const detection of resizedDetections) {
                    const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
                    
                    if (bestMatch.label !== 'unknown') {
                        const [id, name, photo] = bestMatch.label.split('||');
                        triggerAttendance(id, name, photo);
                        break; 
                    }
                }
            }, 800);
        });

        async function triggerAttendance(studentId, studentName, studentPhoto) {
            isProcessing = true;
            
            try { beepSound.play(); } catch(e){}
            if (navigator.vibrate) navigator.vibrate(200);

            document.getElementById('info-placeholder').classList.add('hidden');
            const resultDiv = document.getElementById('info-result');
            resultDiv.classList.remove('hidden');
            
            document.getElementById('student-name').innerText = studentName;
            document.getElementById('student-id').innerText = `ID: ${studentId}`;
            document.getElementById('student-img').src = studentPhoto;
            
            const statusLabel = document.getElementById('mark-status');
            statusLabel.innerText = "प्रोसेसिंग...";
            statusLabel.className = "mt-4 px-4 py-1.5 rounded-lg font-semibold inline-block bg-blue-500/20 text-blue-400 border border-blue-500/40";

            try {
                // POST रिक्वेस्ट को text/plain की तरह भेजना ताकि CORS प्री-फ़्लाइट ब्लॉक न हो
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ studentId: studentId })
                });

                // 'no-cors' मोड में रिस्पॉन्स ओपेक (opaque) होता है, इसलिए हम मान लेंगे कि काम हो गया
                statusLabel.innerText = "अटेंडेंस सिग्नल्ड!";
                statusLabel.className = "mt-4 px-4 py-1.5 rounded-lg font-semibold inline-block bg-emerald-500/20 text-emerald-400 border border-emerald-500/40";
                
            } catch (err) {
                statusLabel.innerText = "नेटवर्क त्रुटि!";
                statusLabel.className = "mt-4 px-4 py-1.5 rounded-lg font-semibold inline-block bg-red-500/20 text-red-400 border border-red-500/40";
            }

            setTimeout(() => {
                document.getElementById('info-placeholder').classList.remove('hidden');
                resultDiv.classList.add('hidden');
                overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
                isProcessing = false;
            }, 3500);
        }

        window.onload = init;
    </script>
</body>
</html>
